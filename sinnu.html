<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    color:white;
    width:90%;
    max-width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:fadeIn 1.5s ease;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

p{
    font-size:1.2rem;
    line-height:1.8;
    margin-bottom:20px;
}

.heart{
    font-size:70px;
    animation:beat 1s infinite;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4f81;
    font-size:1rem;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="heart"></div>
    <h1>I'm Sorry</h1>
    <p>
        I know I made a mistake and I truly regret it.
        You mean a lot to me, and I never wanted to hurt you.
        Please forgive me and give me a chance to make things right.
    </p>

    <button onclick="forgiveMe()">Forgive Me?</button>
</div>

<script>
function forgiveMe(){
    alert("Thank You  Your forgiveness means everything to me.");
}
</script>

</body>
</html>
